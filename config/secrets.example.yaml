
# MailRocket secrets.
#
# Copy this file to config/secrets.yaml and fill in real values. The actual
# secrets.yaml is gitignored. Each value can also be supplied via an env var
# named MAILROCKET_SECRET_<UPPER_SNAKE_KEY> (e.g. MAILROCKET_SECRET_GEMINI_API_KEY).

linkedin:
  username: ""
  password: ""

# https://aistudio.google.com/app/apikey
gemini_api_key: ""

# https://console.groq.com/keys
groq_api_key: ""

# https://openrouter.ai/keys  (optional — leave empty to skip openrouter models)
openrouter_api_key: ""

# https://cloud.cerebras.ai (free tier: ~14,400 req/day — most generous of all)
cerebras_api_key: ""

# https://console.mistral.ai/api-keys (free Experiment plan, ~1B tokens/month)
mistral_api_key: ""

# GitHub PAT with `models:read` scope — https://github.com/settings/tokens
# Free tier gives access to gpt-4o, o3-mini, Llama, Phi, Mistral, etc.
github_token: ""

# Gmail OAuth client + token are JSON files (download from Google Cloud
# Console). Store them under data/gmail/. Paths are relative to repo root.
gmail:
  client_secret_path: data/gmail/client_secret.json
  token_path: data/gmail/token.json

# Langfuse observability (optional but highly recommended).
# Sign up at https://cloud.langfuse.com (free tier) or self-host. When the
# keys are set, every LLM call made by the analyzer is traced — model used,
# latency, token cost, prompt, response, and the post_link it was about.
# Leave empty to disable; the analyzer falls back to ordinary logging.
langfuse:
  public_key: ""
  secret_key: ""
  host: "https://cloud.langfuse.com"
